<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress Fitness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f6f1e7;
      --paper:#fffdf8;
      --paper-2:#f1ebe0;
      --ink:#171511;
      --muted:#6e675d;
      --line:rgba(23,21,17,.08);
      --accent:#c45730;
      --green:#2f6049;
      --gold:#b88d55;
      --danger:#b94d44;
      --shadow:0 22px 50px rgba(34,23,12,.08);
      --radius:24px;
    }
    body{
      font-family:'DM Sans',system-ui,sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at top left, rgba(196,87,48,.12), transparent 24%),
        radial-gradient(circle at top right, rgba(47,96,73,.10), transparent 22%),
        linear-gradient(180deg, #fbf7f0 0%, #f2ece1 100%);
      min-height:100vh;
    }
    button,input,select{font:inherit}
    .app-shell{max-width:1180px;margin:0 auto;padding:22px 18px 110px}
    .topbar{
      display:flex;justify-content:space-between;align-items:center;gap:14px;
      margin-bottom:18px;padding:14px 16px;border-radius:999px;background:rgba(255,253,248,.78);
      border:1px solid var(--line);box-shadow:0 10px 28px rgba(28,20,10,.05);backdrop-filter:blur(14px)
    }
    .brand{display:flex;align-items:center;gap:12px}
    .brand-mark{
      width:42px;height:42px;border-radius:15px;display:grid;place-items:center;
      background:linear-gradient(135deg,var(--green),#4d8768);color:#fff;font-weight:700
    }
    .brand-kicker,.section-kicker,.tiny{text-transform:uppercase;letter-spacing:.12em}
    .brand-kicker{font-size:10px;color:var(--muted);margin-bottom:3px}
    .brand-title{font-weight:700;font-size:15px}
    .status-row{display:flex;gap:8px;flex-wrap:wrap}
    .status-pill{
      font-size:12px;padding:8px 11px;border-radius:999px;background:rgba(255,255,255,.7);
      border:1px solid var(--line);color:var(--muted)
    }
    .status-pill strong{color:var(--ink)}

    .hero{
      display:grid;grid-template-columns:minmax(0,1.15fr) minmax(320px,.85fr);gap:18px;
      margin-bottom:18px
    }
    .hero-card,.card,.panel,.phone{
      background:rgba(255,253,248,.84);border:1px solid var(--line);box-shadow:var(--shadow)
    }
    .hero-card{border-radius:34px;padding:28px}
    .hero-card h1{
      font-family:'Playfair Display',Georgia,serif;font-size:clamp(36px,5vw,62px);
      line-height:.95;letter-spacing:-.03em;max-width:10ch;margin-bottom:14px
    }
    .hero-card h1 em{font-style:normal;color:var(--accent)}
    .hero-copy{font-size:16px;color:var(--muted);line-height:1.7;max-width:62ch}
    .hero-grid{margin-top:18px;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .mini-stat{
      border-radius:20px;padding:16px;background:rgba(255,255,255,.8);border:1px solid rgba(23,21,17,.06)
    }
    .mini-stat strong{display:block;font-size:28px;line-height:1;margin-bottom:5px}
    .mini-stat span{font-size:12px;color:var(--muted);line-height:1.5}
    .coach-card{border-radius:34px;padding:22px;display:flex;flex-direction:column;gap:14px}
    .section-kicker{font-size:10px;color:var(--accent)}
    .coach-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
    .coach-head h2{font-size:26px;line-height:1.05;max-width:10ch}
    .tone{
      display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:999px;
      font-size:12px;background:#ebf3ee;color:var(--green);border:1px solid rgba(47,96,73,.12)
    }
    .coach-note{
      border-radius:22px;padding:16px;background:linear-gradient(135deg,#efe7da,#faf6ef);
      border:1px solid rgba(23,21,17,.06)
    }
    .coach-note strong{display:block;font-size:16px;margin-bottom:7px}
    .coach-note p{font-size:14px;color:var(--muted);line-height:1.6}
    .coach-list{display:grid;gap:10px}
    .coach-item{
      display:flex;justify-content:space-between;gap:12px;padding:13px 14px;border-radius:18px;
      border:1px solid rgba(23,21,17,.06);background:rgba(255,255,255,.82)
    }
    .coach-item strong{display:block;font-size:14px;margin-bottom:4px}
    .coach-item span,.coach-item b{font-size:12px;line-height:1.45}
    .coach-item span{color:var(--muted)}
    .coach-item b{color:var(--green);white-space:nowrap}
